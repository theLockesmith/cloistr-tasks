stages:
  - build

.kaniko-auth: &kaniko-auth
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

build:backend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  <<: *kaniko-auth
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR}/backend --dockerfile ${CI_PROJECT_DIR}/backend/Dockerfile --destination ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/cloistr-tasks-backend:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/cloistr-tasks-backend:latest

build:frontend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  <<: *kaniko-auth
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR}/frontend --dockerfile ${CI_PROJECT_DIR}/frontend/Dockerfile --destination ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/cloistr-tasks-frontend:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/cloistr-tasks-frontend:latest
