stages:
  - build

variables:
  # Harbor Container Registry
  CONTAINER_REGISTRY: oci.coldforge.xyz
  BACKEND_IMAGE: ${CONTAINER_REGISTRY}/coldforge/ritual-forge-backend
  FRONTEND_IMAGE: ${CONTAINER_REGISTRY}/coldforge/ritual-forge-frontend

# =============================================================================
# BUILD JOBS
# =============================================================================

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CONTAINER_REGISTRY}
  script:
    - docker build -t ${BACKEND_IMAGE}:${CI_COMMIT_SHA} -t ${BACKEND_IMAGE}:latest ./backend
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CONTAINER_REGISTRY}
  script:
    - docker build -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHA} -t ${FRONTEND_IMAGE}:latest ./frontend
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_SHA}
    - docker push ${FRONTEND_IMAGE}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*

# Build all - runs on any commit to master/main
build-all:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CONTAINER_REGISTRY}
  script:
    - echo "Building backend..."
    - docker build -t ${BACKEND_IMAGE}:${CI_COMMIT_SHA} -t ${BACKEND_IMAGE}:latest ./backend
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
    - echo "Building frontend..."
    - docker build -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHA} -t ${FRONTEND_IMAGE}:latest ./frontend
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_SHA}
    - docker push ${FRONTEND_IMAGE}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'

# Tagged releases (semver only)
build-release:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CONTAINER_REGISTRY}
  script:
    - docker build -t ${BACKEND_IMAGE}:${CI_COMMIT_TAG} ./backend
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_TAG}
    - docker build -t ${FRONTEND_IMAGE}:${CI_COMMIT_TAG} ./frontend
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_TAG}
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
