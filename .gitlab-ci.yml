stages:
  - build

variables:
  # GitLab Container Registry
  REGISTRY: ${CI_REGISTRY}
  IMAGE_PATH: ${CI_REGISTRY_IMAGE}

# =============================================================================
# BUILD JOBS
# =============================================================================

build-backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - docker build -t ${IMAGE_PATH}/backend:${CI_COMMIT_SHA} -t ${IMAGE_PATH}/backend:latest ./backend
    - docker push ${IMAGE_PATH}/backend:${CI_COMMIT_SHA}
    - docker push ${IMAGE_PATH}/backend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*

build-frontend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - docker build -t ${IMAGE_PATH}/frontend:${CI_COMMIT_SHA} -t ${IMAGE_PATH}/frontend:latest ./frontend
    - docker push ${IMAGE_PATH}/frontend:${CI_COMMIT_SHA}
    - docker push ${IMAGE_PATH}/frontend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*

# Build all - runs on any commit to master/main
build-all:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - echo "Building backend..."
    - docker build -t ${IMAGE_PATH}/backend:${CI_COMMIT_SHA} -t ${IMAGE_PATH}/backend:latest ./backend
    - docker push ${IMAGE_PATH}/backend:${CI_COMMIT_SHA}
    - docker push ${IMAGE_PATH}/backend:latest
    - echo "Building frontend..."
    - docker build -t ${IMAGE_PATH}/frontend:${CI_COMMIT_SHA} -t ${IMAGE_PATH}/frontend:latest ./frontend
    - docker push ${IMAGE_PATH}/frontend:${CI_COMMIT_SHA}
    - docker push ${IMAGE_PATH}/frontend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
