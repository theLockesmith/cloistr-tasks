stages:
  - update
  - build

variables:
  NODE_VERSION: "22"

# Auto-update @cloistr/ui when triggered from upstream
update-dependency:
  stage: update
  image: node:${NODE_VERSION}-alpine
  rules:
    - if: '$UPSTREAM_TRIGGER == "true"'
  before_script:
    - apk add --no-cache git openssh-client
    - git config --global user.email "ci@coldforge.xyz"
    - git config --global user.name "GitLab CI"
  script:
    - cd frontend
    - echo "Updating ${UPSTREAM_PACKAGE}..."
    - npm update ${UPSTREAM_PACKAGE}
    - |
      if git diff --quiet package-lock.json; then
        echo "No changes to lockfile, already up to date"
      else
        echo "Lockfile updated, committing..."
        git add package-lock.json package.json
        git commit -m "chore: Update ${UPSTREAM_PACKAGE} [auto]"
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
      fi

.kaniko-auth: &kaniko-auth
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

build:backend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  <<: *kaniko-auth
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR}/backend --dockerfile ${CI_PROJECT_DIR}/backend/Dockerfile --destination ${CI_REGISTRY_IMAGE}/backend:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY_IMAGE}/backend:latest

build:frontend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  <<: *kaniko-auth
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR}/frontend --dockerfile ${CI_PROJECT_DIR}/frontend/Dockerfile --destination ${CI_REGISTRY_IMAGE}/frontend:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY_IMAGE}/frontend:latest
